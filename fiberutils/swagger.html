<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swagger UI</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%2324292f'/%3E%3Ctext x='50' y='58' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3ESW%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-themes@3.0.1/themes/theme-feeling-blue.css" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f6f8fa;
        }

        .swagger-ui .topbar {
            display: none;
        }

        #swagger-ui {
            max-width: 980px;
            margin: 40px auto;
        }

        .swagger-ui .info {
            margin-bottom: 30px;
        }

        .swagger-ui .scheme-container {
            background: #ffffff;
            box-shadow: none;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>

<script>
    window.onload = () => {
        SwaggerUIBundle({
            url: "openapi.yaml",
            dom_id: "#swagger-ui",
            deepLinking: true,
            layout: "BaseLayout"
        });
    };
</script>
</body>
</html>
